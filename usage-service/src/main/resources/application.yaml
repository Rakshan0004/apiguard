spring:
  application:
    name: usage-service
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5435}/apiguard
    username: apiguard
    password: secret
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: apiguard
    password: secret
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-version: 0
    table: usage_flyway_history
    locations: classpath:db/migration

server:
  port: 8082

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# Quota Enforcement Configuration
quota:
  enforcement:
    enabled: ${QUOTA_ENFORCEMENT_ENABLED:true}
    management-service-url: ${MANAGEMENT_SERVICE_URL:http://localhost:8081}
    timeout-ms: ${QUOTA_ENFORCEMENT_TIMEOUT:5000}
    connection-pool-size: ${QUOTA_ENFORCEMENT_POOL_SIZE:10}

management:
  endpoints:
    web:
      exposure:
        include: health
