spring:
  application:
    name: gateway-service
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: 5672
    username: apiguard
    password: secret

server:
  port: 8080

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000}

# URL of the Management Service (used for route loading + key validation)
management:
  service:
    url: ${MANAGEMENT_SERVICE_URL:http://localhost:8081}

logging:
  level:
    com.apiguard.gateway: DEBUG
