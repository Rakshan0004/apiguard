services:
  postgres:
    image: 'postgres:16-alpine'
    environment:
      - 'POSTGRES_DB=apiguard'
      - 'POSTGRES_PASSWORD=secret'
      - 'POSTGRES_USER=apiguard'
    ports:
      - '5435:5432'
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apiguard"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: 'redis:7-alpine'
    ports:
      - '6380:6379'
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: 'rabbitmq:3-management-alpine'
    environment:
      - 'RABBITMQ_DEFAULT_PASS=secret'
      - 'RABBITMQ_DEFAULT_USER=apiguard'
    ports:
      - '5672:5672'
      - '15672:15672'
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 10s
      timeout: 10s
      retries: 5

  api-management-service:
    build:
      context: .
      args:
        MODULE_NAME: api-management-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - REDIS_HOST=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s


  gateway-service:
    build:
      context: .
      args:
        MODULE_NAME: gateway-service
    ports:
      - "8080:8080"
    environment:
      - REDIS_HOST=redis
      - RABBITMQ_HOST=rabbitmq
      - MANAGEMENT_SERVICE_URL=http://api-management-service:8081
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      api-management-service:
        condition: service_healthy

  usage-service:
    build:
      context: .
      args:
        MODULE_NAME: usage-service
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - RABBITMQ_HOST=rabbitmq
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
